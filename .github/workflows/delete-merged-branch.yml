name: Delete Merged Branch

on:
  pull_request:
    types: [closed]

jobs:
  delete_branch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Delete source branch after merge
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Não tenta apagar branch de fork.
            if (pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              core.info(`PR de fork (${pr.head.repo.full_name}); branch não será removida.`);
              return;
            }

            // Segurança extra para nunca apagar a branch padrão.
            const defaultBranch = context.payload.repository.default_branch;
            if (pr.head.ref === defaultBranch) {
              core.info(`Branch ${pr.head.ref} é a default branch; não será removida.`);
              return;
            }

            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${pr.head.ref}`,
            });

            core.info(`Branch heads/${pr.head.ref} removida com sucesso.`);
